# Ordyn Redis profile.

bind 0.0.0.0
protected-mode no
port 6379
dir /data

appendonly yes
appendfsync everysec
save 900 1
save 300 10
save 60 10000

loglevel notice
slowlog-log-slower-than 10000
slowlog-max-len 512
latency-monitor-threshold 100

maxmemory 2gb
maxmemory-policy noeviction

timeout 0
tcp-keepalive 300
databases 16
